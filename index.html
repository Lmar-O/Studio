function App() {

  const scroll = (dir) => {
    const el = railRef.current;
    if (el) el.scrollBy({ left: dir * el.clientWidth * 0.8, behavior: "smooth" });

  const activeRateData = RATES.find(r => r.id === activeRate) || RATES[0];

  // Populate the Projects dropdown, wire the mobile menu, and start
  // reveal observers after React mounts (targets only exist post-render).
  useEffect(() => {
    if (typeof window.renderProjectsDropdown === 'function') window.renderProjectsDropdown();
    if (typeof window.initMobileMenu === 'function') window.initMobileMenu();
    if (typeof window.initReveals === 'function') window.initReveals();
  }, []);

  const [feed, setFeed] = useState(null);
  useEffect(() => {
    let alive = true;
    fetch(BEHOLD_URL)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        if (!alive) return;
        const posts = (data.posts || []).slice(0, 12).map(p => ({
          id: p.id,
          url: p.permalink,
          img: (p.sizes && p.sizes.medium && p.sizes.medium.mediaUrl) || p.mediaUrl,
          isVideo: p.mediaType === "VIDEO",
          isAlbum: p.mediaType === "CAROUSEL_ALBUM"
        }));
        setFeed({ posts, profile: { username: data.username, avatar: data.profilePictureUrl } });
      })
      .catch(() => { if (alive) setFeed({ posts: [], error: true }); });
    return () => { alive = false; };
  }, []);

          <span className="mt-icon"><span></span></span>
        </button>
      </header>

          <a href="/#photography">Photography</a>
          <a href="/#video">Video</a>

            Projects <span className="m-caret">+</span>
          </button>
          <ul className="m-projects" id="mProjects" data-projects-mobile></ul>
          <a href="/#rates">Rates</a>
          <a href="/#about">About</a>
          <a href="/#feed">Feed</a>
          <a href="/contact.html">Contact</a>
          <a href="/contact.html" className="m-cta">Get in touch →</a>
        </nav>
      </div>

      {/* HERO */}
      <section className="hero" id="work">
        <div className="hero-text">
          <div>
            <span className="eyebrow">Booking shoots · Spring '26</span>
            <h1 className="hero-title">Hi, I'm <em>Lmar</em>.<br/>I shoot photo<br/>&amp; video.</h1>
            <p className="hero-bio">
              Based in San Antonio. Cars, streets, and the occasional
              landscape that won't sit still. Always chasing good light
              and a faster shutter.
            </p>
            <div className="hero-row">
              <a href="#photography" className="pill pill--primary">See the work →</a>
              <a href={D.instagram} className="pill pill--ghost">@lmar.oria</a>
            </div>
            <div className="hero-meta">
              <div>BASED IN<span>San Antonio, TX</span></div>
              <div>SHOOTING<span>Cars · Streets · Land</span></div>
              <div>STATUS<span>Booking shoots</span></div>
            </div>
          </div>
        </div>
        <div className="hero-img">
          <img src={P(1).src} alt={P(1).alt} />
          <div className="hero-img-meta">
            <strong>Porsche GT3</strong>
            <span>SATX · Apr 2025</span>
          </div>
        </div>

              </div>
            </div>
          </div>
        </div>

      {/* PHOTOGRAPHY GRID */}

        <div className="section-head reveal">
          <span className="kicker">— Photography</span>
          <h2 className="h2">Selected <em>frames</em></h2>

        </div>

            <div className="proj-cap">

            <span className="ig-meta">
              {!feed && "Loading…"}
              {feed && feed.error && "Could not load feed"}
              {feed && !feed.error && `Latest ${feed.posts.length} posts`}
            </span>
          </div>
          <div className="ig-arrows">
            <button className="ig-arrow" onClick={() => scroll(-1)} aria-label="Previous">←</button>
            <button className="ig-arrow" onClick={() => scroll(1)} aria-label="Next">→</button>
          </div>
        </div>
        <div className="ig-rail reveal" ref={railRef}>
          {feed && !feed.error && feed.posts.length > 0
            ? feed.posts.map((post) => (
                <a key={post.id} className="ig-tile" href={post.url} target="_blank" rel="noopener noreferrer">
                  <img src={post.img} alt="" loading="lazy" />
                </a>
              ))
            : Array.from({ length: 7 }).map((_, i) => (
                <a key={i} className="ig-tile ig-tile--skeleton" href={D.instagram} target="_blank" rel="noopener noreferrer" aria-hidden="true"></a>
              ))
          }
        </div>
      </section>

      {/* CONTACT TEASER */}

        <div className="contact-teaser-card reveal">
          <div>
            <h2>Got something <em>in mind?</em></h2>
            <p>Shoots, collabs, or just a coffee — head over to the contact page and tell me about it. For business or commercial inquiries, email me directly.</p>
          </div>
          <div className="contact-row">
            <a className="pill pill--primary" href="/contact.html">Go to contact →</a>
            <a className="pill pill--ghost" href={`mailto:${D.email}?subject=Business inquiry`}>Email for business</a>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="foot">
        <span>© 2026 Lmars Studio · Shot in San Antonio</span>
        <span className="foot-links">
          <a href={D.instagram}>Instagram</a>
          {/* <a href={D.tiktok}>TikTok</a> */}
          {/* <a href={D.youtube}>YouTube</a> */}
          <a href={`mailto:${D.email}`}>Email</a>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
