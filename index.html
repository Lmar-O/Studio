              behavior: "smooth",
            });

        const [lightbox, setLightbox] = useState(null);

        useEffect(() => {
          if (!lightbox) return;
          const handler = (e) => { if (e.key === "Escape") setLightbox(null); };
          document.addEventListener("keydown", handler);
          return () => document.removeEventListener("keydown", handler);
        }, [lightbox]);

        const [activeRate, setActiveRate] = useState(RATES[0].id);
        const activeRateData =
          RATES.find((r) => r.id === activeRate) || RATES[0];

          if (typeof window.initMobileMenu === "function")

          if (typeof window.initReveals === "function") window.initReveals();

              const posts = (data.posts || []).slice(0, 12).map((p) => ({
                id: p.id,
                url: p.permalink,
                img:
                  (p.sizes && p.sizes.medium && p.sizes.medium.mediaUrl) ||
                  p.mediaUrl,
                isVideo: p.mediaType === "VIDEO",
                isAlbum: p.mediaType === "CAROUSEL_ALBUM",
              }));
              setFeed({
                posts,
                profile: {
                  username: data.username,
                  avatar: data.profilePictureUrl,
                },
              });
            })
            .catch(() => {
              if (alive) setFeed({ posts: [], error: true });
            });
          return () => {
            alive = false;
          };

                    Email for business
                  </a>
                </div>
              </div>
            </section>

            {/* LIGHTBOX */}
            {lightbox && (
              <div className="lightbox" onClick={() => setLightbox(null)} role="dialog" aria-modal="true" aria-label={lightbox.alt}>
                <button className="lb-close" onClick={() => setLightbox(null)} aria-label="Close">✕</button>
                <div className="lb-img-wrap" onClick={(e) => e.stopPropagation()}>
                  <img src={lightbox.src} alt={lightbox.alt} />
                </div>
              </div>
            )}

            {/* FOOTER */}
            <footer className="foot section--dark">
              <span>© 2026 Lmar Oria · Shot in San Antonio</span>
              <span className="foot-links">
                <a href={D.instagram}>Instagram</a>
                {/* <a href={D.tiktok}>TikTok</a> */}
                {/* <a href={D.youtube}>YouTube</a> */}
                <a href={`mailto:${D.email}`}>Email</a>
              </span>
            </footer>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
